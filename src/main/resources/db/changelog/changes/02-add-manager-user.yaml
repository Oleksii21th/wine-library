databaseChangeLog:
  - changeSet:
      id: add-manager-user
      author: Oleksii Babych
      preConditions:
        - onFail: MARK_RAN
        - sqlCheck:
            expectedResult: 0
            sql: "SELECT COUNT(*) FROM users WHERE email='admin@user.com'"
      changes:
        - insert:
            tableName: users
            columns:
              - column:
                  name: email
                  value: "admin@user.com"
              - column:
                  name: full_name
                  value: "Admin"
              - column:
                  name: birth_date
                  valueDate: "2005-01-01"
              - column:
                  name: password
                  value: "$2a$12$RXKgBECUCPf1bf.8J2jShuaer63b8EVFpXu30pA.9ZZkykZc1HoBC"
              - column:
                  name: role
                  value: "MANAGER"
              - column:
                  name: is_deleted
                  valueBoolean: false