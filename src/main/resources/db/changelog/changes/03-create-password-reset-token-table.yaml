databaseChangeLog:
  - changeSet:
      id: create-password-reset-token-table
      author: Oleksii Babych
      preConditions:
        - onFail: MARK_RAN
        - not:
            tableExists:
              tableName: password_reset_token
      changes:
        - createTable:
            tableName: password_reset_token
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: token
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: expires_at
                  type: DATETIME
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    unique: true
        - addForeignKeyConstraint:
            baseTableName: password_reset_token
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_password_reset_token_user